<!DOCTYPE html>
<html>
<head>
<title>AI Secret World Chatbot</title>
<style>
body{
font-family: Arial;
background:black;
color:white;
text-align:center;
}

#chatbox{
width:80%;
height:300px;
border:1px solid white;
margin:auto;
overflow:auto;
padding:10px;
}

input{
width:70%;
padding:10px;
}

button{
padding:10px;
}
</style>
</head>

<body>

<h1>AI Secret World Chatbot</h1>

<div id="chatbox"></div>

<br>

<input id="userInput" placeholder="Type your message">
<button onclick="sendMessage()">Send</button>

<script>
function sendMessage(){

let input=document.getElementById("userInput").value

let chatbox=document.getElementById("chatbox")

chatbox.innerHTML+="<p>You: "+input+"</p>"

chatbox.innerHTML+="<p>AI: I am learning... soon I will be powerful AI!</p>"

}
</script>

</body>
</html>
