<!DOCTYPE html>
<html>
<head>
<title>MyTurn AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>MyTurn AI Chat</h2>

<div id="chat"></div>

<input id="userInput" type="text" placeholder="Ask MyTurn AI...">

<button onclick="sendMessage()">Send</button>

<script src="script.js"></script>

</body>
</html><div id="chatbox"></div>

<br>

import { askAI } from "./api/ai.js"

function sendMessage(){

let input = document.getElementById("userInput").value

let reply = askAI(input)

document.getElementById("chat").innerHTML +=
"<p>You: "+input+"</p>"

document.getElementById("chat").innerHTML +=
"<p>MyTurn AI: "+reply+"</p>"

}

}
</script>

</body>
</html>
